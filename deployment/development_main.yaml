version: "3.8"
name: krangka
services:
  krangka_app_db:
    image: mariadb:latest
    container_name: krangka_app_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${APP_DB_PASSWORD:-mariadb}
      MYSQL_DATABASE: ${APP_DB_NAME:-db_app}
      MYSQL_USER: ${APP_DB_USERNAME:-mariadb}
      MYSQL_PASSWORD: ${APP_DB_PASSWORD:-mariadb}
    ports:
      - "3300:3306"
    volumes:
      - data_krangka:/var/lib/mysql
    networks:
      - net_app
  krangka_app_redis_master:
    image: "bitnami/redis"
    container_name: krangka_app_redis_master
    environment:
      - REDIS_REPLICATION_MODE=master
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "6377:6379"
    networks:
      - net_app
  krangka_app_redis_replica:
    image: "bitnami/redis"
    container_name: krangka_app_redis_replica
    environment:
      - REDIS_REPLICATION_MODE=replica
      - REDIS_MASTER_HOST=krangka_app_redis_master
      - REDIS_MASTER_PASSWORD=
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "6379"
    depends_on:
      - krangka_app_redis_master
    networks:
      - net_app
  krangka_app_redis_sentinel:
    image: "bitnami/redis-sentinel"
    container_name: krangka_app_redis_sentinel
    environment:
      - REDIS_MASTER_SET=mymaster
      - REDIS_MASTER_HOST=127.0.0.1
      - REDIS_MASTER_PORT_NUMBER=6377
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=10000
    depends_on:
      - krangka_app_redis_master
      - krangka_app_redis_replica
    ports:
      - "26381:26379"
    networks:
      - net_app
  krangka_app_jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: krangka_app_jaeger
    ports:
      - "6831:6831/udp" # Port for sending spans (UDP)
      - "6832:6832/udp" # Additional UDP port (optional)
      - "5775:5775/udp" # Port for zipkin-compatible spans
      - "5778:5778" # Configuration server
      - "16686:16686" # Web UI
      - "14268:14268" # HTTP collector
      - "14250:14250" # GRPC collector
      - "9411:9411" # Zipkin HTTP endpoint
    environment:
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
    networks:
      - net_app
networks:
  net_app:
    driver: bridge
volumes:
  data_krangka:
