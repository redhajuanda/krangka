schema: spec-driven

# Project context for Krangka - Hexagonal Architecture Go Application
context: |
  Use **krangka-related skills only** for architecture, conventions, and implementation guidance. Do not duplicate or explain that content here.
  - **krangka-expert**: Architecture, adding features, errors, repos, pagination, outbox, bootstrap, workers, subscribers, dlock, logger, testing, code style. Read the skill and its references as needed.
  - **krangka-install**: Installing CLI, creating a new project, config, Docker, migrate, running http/subscriber/worker. Use when setting up a new Krangka project.
  - **krangka-upgrade**: Upgrading the framework from current version to latest. Use when upgrading krangka version.
  - **krangka-query-review**: Generating query review documents from Sikat RunRaw/Run usage. Use when reviewing or documenting SQL queries.
  If a skill conflicts with the user request, ask for clarification.

# Per-artifact rules
rules:
  proposal:
    - Use skill **krangka-expert** for architecture, layers, DDD, and acceptance criteria.
    - Keep proposals under 1000 words; include Goals and Non-goals; use ubiquitous language.
  
  spec:
    - Use skill **krangka-expert** (error-handling, code style) for error formats and DTOs.
    - OpenAPI 3.0; RESTful; document request/response and error responses; auth if applicable.
  
  tasks:
    - Use skill **krangka-expert** for file locations, TDD order, review gate, and layer breakdown.
    - Follow canonical feature order and references from krangka-expert (adding-features, repository, workers, bootstrap, testing).
